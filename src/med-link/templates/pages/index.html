{% load static %}

<c-layouts.base>
<main class="hero bg-base-200 py-32">
  <div class="hero-content flex-col lg:flex-row-reverse">
    <img
      src="{% static 'images/django-starter-fig.png' %}"
      class="max-w-sm rounded-lg shadow-2xl"
    />
    <div>
      <h1 class="text-5xl font-bold">Django Starter</h1>
      <p class="py-6">
        Template moderno para projetos Django com Tailwind CSS, DaisyUI e Django Cotton. 
        Desenvolvimento rápido com componentes reutilizáveis, auto-reload e configurações otimizadas para aprendizado.
      </p>
      <button class="btn btn-primary">Começar Agora</button>
    </div>
  </div>
</main>
</c-layouts.base>
